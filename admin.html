<!DOCTYPE html>
<html>
<head>

<title>Dashboard Admin UKOM Radiografer</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2785/2785544.png">

<style>

body{
font-family:Arial;
background:#0f2027;
color:white;
text-align:center;
margin:0;
padding:20px
}

table{
margin:auto;
margin-top:30px;
border-collapse:collapse;
background:white;
color:black;
min-width:400px
}

th,td{
padding:10px 20px;
border:1px solid #ccc
}

th{
background:#1f4e79;
color:white
}

h1{
margin-top:20px
}

</style>
</head>

<body>

<h1>Dashboard Hasil UKOM Radiografer</h1>

<table id="table">
<thead>
<tr>
<th>NIK</th>
<th>Nama</th>
<th>Score</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBNi-964HuljrZfec4oh0hf9gAenVFYNvc",
databaseURL:"https://uji-kom-79ed4-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"uji-kom-79ed4"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

const tbody=document.getElementById("tbody")

onValue(ref(db,"result"),(snap)=>{

tbody.innerHTML=""

if(!snap.exists()){
tbody.innerHTML="<tr><td colspan='4'>Belum ada peserta</td></tr>"
return
}

snap.forEach(data=>{

let d=data.val()
let status=d.score>=60?"LULUS":"TIDAK LULUS"

let row=`
<tr>
<td>${data.key}</td>
<td>${d.nama}</td>
<td>${d.score}</td>
<td>${status}</td>
</tr>
`

tbody.innerHTML+=row

})

})

</script>

</body>
</html>
