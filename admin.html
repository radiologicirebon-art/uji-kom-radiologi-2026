<!DOCTYPE html>
<html>
<head>
<title>Admin Uji Kompetensi</title>

<style>

body{
font-family:Arial;
background:#1e2a38;
color:white;
text-align:center
}

table{
background:white;
color:black;
margin:auto;
margin-top:30px;
border-collapse:collapse
}

td,th{
padding:10px 20px;
border:1px solid #ccc
}

</style>
</head>

<body>

<h1>Dashboard Admin</h1>

<table id="table">
<tr>
<th>NIK</th>
<th>Nama</th>
<th>Score</th>
</tr>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig = {

apiKey: "AIzaSyBNi-964HuljrZfec4oh0hf9gAenVFYNvc",
databaseURL: "https://uji-kom-79ed4-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "uji-kom-79ed4"

};

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

const table=document.getElementById("table")

onValue(ref(db,"result"),(snap)=>{

snap.forEach(data=>{

let d=data.val()

let row=`
<tr>
<td>${data.key}</td>
<td>${d.nama}</td>
<td>${d.score}</td>
</tr>
`

table.innerHTML+=row

})

})

</script>

</body>
</html>
