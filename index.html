<!DOCTYPE html>
<html>
<head>

<title>Uji Kompetensi Radiografer</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif
}

body{
background:linear-gradient(135deg,#141E30,#243B55);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white
}

.container{
width:100%;
max-width:420px;
padding:20px
}

.card{

background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:16px;
padding:25px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);

animation:fadeUp 0.8s ease
}

@keyframes fadeUp{

from{
opacity:0;
transform:translateY(40px)
}

to{
opacity:1;
transform:translateY(0)
}

}

h1{
text-align:center;
margin-bottom:20px
}

input{

width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
font-size:16px

}

button{

width:100%;
padding:14px;
margin-top:15px;

background:#00c6ff;
background:linear-gradient(45deg,#00c6ff,#0072ff);

border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;

transition:0.3s

}

button:hover{
transform:scale(1.05)
}

.option{

background:white;
color:black;

padding:12px;
border-radius:10px;
margin-top:10px;

cursor:pointer;

transition:0.2s;

}

.option:hover{

transform:scale(1.03);
background:#e7f1ff

}

.option:active{
transform:scale(0.95)
}

.progress{

height:8px;
background:#333;
border-radius:20px;
margin-top:10px;
overflow:hidden

}

.progress-bar{

height:8px;
background:#00c6ff;
width:0%

}

.question{

margin-top:15px;
font-size:16px

}

.scoreBox{

text-align:center;
font-size:20px;
margin-top:20px

}

.toast{

position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);

background:#000;
color:white;

padding:12px 20px;
border-radius:30px;

opacity:0;
transition:0.4s

}

.toast.show{
opacity:1
}

.spinner{

border:5px solid rgba(255,255,255,0.2);
border-top:5px solid white;
border-radius:50%;
width:40px;
height:40px;

animation:spin 1s linear infinite;
margin:auto;
margin-top:10px

}

@keyframes spin{
to{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div class="container">

<h1>UKOM Radiografer</h1>

<div id="loginBox" class="card">

<h3>Login Peserta</h3>

<input id="nik" placeholder="Masukkan NIK">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Masuk</button>

<div id="loading"></div>

</div>


<div id="quizBox" class="card" style="display:none">

<h3 id="welcome"></h3>

<div class="progress">
<div id="bar" class="progress-bar"></div>
</div>

<div id="questionBox"></div>

</div>

</div>

<div id="toast" class="toast"></div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBNi-964HuljrZfec4oh0hf9gAenVFYNvc",
databaseURL:"https://uji-kom-79ed4-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"uji-kom-79ed4"
}

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

let currentUser=""
let currentName=""
let currentQuestion=0
let score=0

function toast(msg){

let t=document.getElementById("toast")
t.innerText=msg
t.classList.add("show")

setTimeout(()=>t.classList.remove("show"),2500)

}

const users={

"201007041":"Lalan Permana Herlambang",
"200603010":"Feby Fardianto",
"200903058":"Elis Mandalasari",
"201706029":"Argo Nur Pujianto",
"201911092":"Tikha Kania",
"201506094":"Ipu Yoga",
"201501001":"Sri Cahyati",
"201011060":"Opan Sopandi",
"201307041":"Vinggih Hernanda",
"201807083":"Fahmi Puja",
"201907052":"Gilang Nurgianti",
"202101209":"Ardi Pratama",
"202207105":"Zhafira Nur",
"202303119":"Dwi Alfi",
"202310276":"Rita Riana",
"202403156":"Rizky Maulana",
"202411359":"Rafi Azhar",
"202502147":"Dias Riyandi",
"202507169":"Taufik",
"202508171":"Arief Maulana",
"202508172":"Salsa Dea"

}


const questions=[

{q:"Diagnosis radiologis paling mungkin pada opasitas hemithorax bawah?",o:["Pneumothorax","Hemothorax","TB","Pneumonia","Emfisema"],a:1},

{q:"Kasus FOOSH suspected scaphoid?",o:["AP ulang","Scaphoid view","Oblique","SID","Grid"],a:1},

{q:"Clavicula kanan lebih dekat vertebra?",o:["Over","Under","Rotasi kanan","Rotasi kiri","Inspirasi"],a:2},

{q:"Petrous ridge bawah orbita Caldwell?",o:["Sudut besar","Fleksi","Ekstensi","Rotasi","SID"],a:2},

{q:"Abdomen terlalu terang?",o:["kVp tinggi","kVp rendah","mAs tinggi","mAs rendah","SID"],a:0},

{q:"C1-C5 saja?",o:["kVp","Swimmer","mAs","Grid","Kolimasi"],a:1},

{q:"Waters petrous menutup sinus?",o:["Ekstensi","Fleksi","Rotasi","SID","Kolimasi"],a:1},

{q:"Foramen kanan besar?",o:["Rot kanan","Rot kiri","Tilt","Tilt","OID"],a:1},

{q:"Thorax 7 ribs?",o:["Over","Inspirasi kurang","kVp","mAs","Rotasi"],a:1},

{q:"CT kontras cek?",o:["Hb","Leukosit","Kreatinin","Trombosit","SGOT"],a:2}

]


window.login=async function(){

let nik=document.getElementById("nik").value
let pass=document.getElementById("password").value

document.getElementById("loading").innerHTML='<div class="spinner"></div>'

// LOGIN ADMIN
if(nik=="admin" && pass=="admin123"){
window.location="admin.html"
return
}

// LOGIN PESERTA
if(pass!="123"){
toast("Password salah")
document.getElementById("loading").innerHTML=""
return
}

if(!users[nik]){
toast("NIK tidak terdaftar")
document.getElementById("loading").innerHTML=""
return
}

const snapshot=await get(child(ref(db),"result/"+nik))

if(snapshot.exists()){
toast("Anda sudah mengikuti ujian")
document.getElementById("loading").innerHTML=""
return
}

currentUser=nik
currentName=users[nik]

document.getElementById("loginBox").style.display="none"
document.getElementById("quizBox").style.display="block"

document.getElementById("welcome").innerHTML="Halo "+currentName

showQuestion()

}

}

function showQuestion(){

if(currentQuestion>=questions.length){
finishQuiz()
return
}

let q=questions[currentQuestion]

let percent=((currentQuestion)/10)*100
document.getElementById("bar").style.width=percent+"%"

let html="<div class='question'><b>Soal "+(currentQuestion+1)+"</b><br>"+q.q+"</div>"

q.o.forEach((opt,i)=>{

html+=`<div class="option" onclick="answer(${i})">${opt}</div>`

})

document.getElementById("questionBox").innerHTML=html

}

window.answer=function(i){

if(i==questions[currentQuestion].a){
score++
}

currentQuestion++

setTimeout(showQuestion,300)

}

async function finishQuiz(){

let percent=(score/10)*100

await set(ref(db,"result/"+currentUser),{

nama:currentName,
score:percent

})

let status=percent>=60?"LULUS":"TIDAK LULUS"

document.getElementById("questionBox").innerHTML=

`<div class="scoreBox">

<h2>Quiz Selesai</h2>

<h1>${percent}</h1>

<h3>${status}</h3>

</div>`

}

</script>

</body>
</html>
