{

options:["Pneumothorax","Hemothorax","Tuberkulosis paru","Pneumonia lobaris","Emfisema"],

},

{
q:"Pasien perempuan 30 tahun jatuh dengan tangan menumpu (FOOSH injury)...",
options:["Ulang wrist AP","Scaphoid view ulnar deviation","Oblique 30°","SID lebih panjang","Gunakan grid"],
answer:1
},

{
q:"Thorax PA menunjukkan clavicula kanan lebih dekat ke vertebra dibanding kiri...",
options:["Overexposure","Underexposure","Rotasi kanan","Rotasi kiri","Inspirasi kurang"],

{

},

{

options:["Ekstensi","Fleksi","Rotasi","SID pendek","Kolimasi"],

},

{

},

{

window.login=async function(){

let nik=document.getElementById("nik").value
let pass=document.getElementById("password").value

if(nik=="201708073" && pass=="Papamama00"){
window.location="admin.html"
return
}

if(pass!="123"){
alert("Password salah")
return
}

if(!users[nik]){
alert("NIK tidak terdaftar")
return
}

const snapshot=await get(child(ref(db),"result/"+nik))

if(snapshot.exists()){
alert("Anda sudah pernah mengikuti kuis")
return
}

currentUser=nik
currentName=users[nik]

document.getElementById("loginBox").style.display="none"
document.getElementById("quizBox").style.display="block"

document.getElementById("welcome").innerHTML="Selamat Datang di Uji Kompetensi Radiologi<br>"+currentName

showQuestion()

}



function showQuestion(){

if(currentQuestion>=questions.length){
finishQuiz()
return
}

let q=questions[currentQuestion]

let html="<h3>Soal "+(currentQuestion+1)+"</h3>"
html+="<p>"+q.q+"</p>"

q.options.forEach((opt,i)=>{
html+=`<div class="option" onclick="answer(${i})">${String.fromCharCode(65+i)}. ${opt}</div>`
})

document.getElementById("questionBox").innerHTML=html

}



window.answer=function(i){

if(i==questions[currentQuestion].answer){
score++
}

currentQuestion++
showQuestion()

}



async function finishQuiz(){

let percent=(score/10)*100

await set(ref(db,"result/"+currentUser),{
nama:currentName,
score:percent
})

let status=percent>=60?"LULUS":"TIDAK LULUS"

document.getElementById("questionBox").innerHTML=

"<h2>Quiz Selesai</h2>"+
"<h3>Score: "+percent+"</h3>"+
"<h2>"+status+"</h2>"

}

</script>
